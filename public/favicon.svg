<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#000000"/>
  
  <!-- Outer circle - Blue -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#42a7c0" stroke-width="8"/>
  
  <!-- Middle circle - Gold -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#D4AF37" stroke-width="3"/>
  
  <!-- Inner circle - Dark background -->
  <circle cx="100" cy="100" r="80" fill="#0a0a0a"/>
  
  <!-- Colorful cross -->
  <g>
    <!-- Vertical bar - Blue to Red gradient -->
    <defs>
      <linearGradient id="vertGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#42a7c0;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#FF0000;stop-opacity:1" />
      </linearGradient>
      <linearGradient id="horizGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#00AA00;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#FFFF00;stop-opacity:1" />
      </linearGradient>
    </defs>
    
    <!-- Vertical bar -->
    <rect x="85" y="50" width="30" height="100" fill="url(#vertGrad)" rx="4"/>
    <!-- Horizontal bar -->
    <rect x="50" y="85" width="100" height="30" fill="url(#horizGrad)" rx="4"/>
  </g>
  
  <!-- Book symbol (simplified) -->
  <g transform="translate(100, 145)">
    <path d="M -12 0 Q -12 -6 -6 -9 L 0 -11 L 6 -9 Q 12 -6 12 0" 
          fill="none" stroke="#42a7c0" stroke-width="2" stroke-linecap="round"/>
    <line x1="-6" y1="-9" x2="-6" y2="0" stroke="#42a7c0" stroke-width="1.5"/>
    <line x1="6" y1="-9" x2="6" y2="0" stroke="#42a7c0" stroke-width="1.5"/>
  </g>
</svg>
