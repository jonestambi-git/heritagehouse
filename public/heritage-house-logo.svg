<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  
  <!-- Colorful cross -->
  <g>
    <!-- Vertical bar - gradient from blue to teal -->
    <rect x="85" y="40" width="30" height="120" fill="url(#crossGradient)" rx="4"/>
    <!-- Horizontal bar - gradient from gold to orange -->
    <rect x="40" y="85" width="120" height="30" fill="url(#crossGradient2)" rx="4"/>
  </g>
  
  <!-- Book symbol (open book) -->
  <g transform="translate(100, 155)">
    <path d="M -15 0 Q -15 -8 -8 -12 L 0 -15 L 8 -12 Q 15 -8 15 0" 
          fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="-12" x2="-8" y2="0" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="8" y1="-12" x2="8" y2="0" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="crossGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#42a7c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d7a8f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crossGradient2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8c547;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
