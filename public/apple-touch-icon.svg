<svg viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="180" height="180" fill="#000000" rx="40"/>
  
  <!-- Outer circle - Blue -->
  <circle cx="90" cy="90" r="85" fill="none" stroke="#42a7c0" stroke-width="7"/>
  
  <!-- Middle circle - Gold -->
  <circle cx="90" cy="90" r="76" fill="none" stroke="#D4AF37" stroke-width="2.5"/>
  
  <!-- Inner circle - Dark background -->
  <circle cx="90" cy="90" r="72" fill="#0a0a0a"/>
  
  <!-- Colorful cross -->
  <g>
    <defs>
      <linearGradient id="vertGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" style="stop-color:#42a7c0;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#FF0000;stop-opacity:1" />
      </linearGradient>
      <linearGradient id="horizGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#00AA00;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#FFFF00;stop-opacity:1" />
      </linearGradient>
    </defs>
    
    <!-- Vertical bar -->
    <rect x="76" y="45" width="28" height="90" fill="url(#vertGrad2)" rx="4"/>
    <!-- Horizontal bar -->
    <rect x="45" y="76" width="90" height="28" fill="url(#horizGrad2)" rx="4"/>
  </g>
  
  <!-- Book symbol -->
  <g transform="translate(90, 130)">
    <path d="M -11 0 Q -11 -5 -5 -8 L 0 -10 L 5 -8 Q 11 -5 11 0" 
          fill="none" stroke="#42a7c0" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-5" y1="-8" x2="-5" y2="0" stroke="#42a7c0" stroke-width="1.3"/>
    <line x1="5" y1="-8" x2="5" y2="0" stroke="#42a7c0" stroke-width="1.3"/>
  </g>
</svg>
